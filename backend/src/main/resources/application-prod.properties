# Production profile — quiet logs, no SQL echo
spring.jpa.show-sql=false

logging.level.org.springframework.security=WARN
logging.level.com.grokdev=INFO
logging.level.org.springframework.web=WARN

# CORS — set explicit origins in production (comma-separated patterns)
grok.cors.allowed-origin-patterns=${GROK_CORS_ORIGIN_PATTERNS:https://your-domain.example}

# Require explicit secrets (no demo defaults if env unset — set JWT_SECRET, DB_* before deploy)
# jwt.secret must be set via JWT_SECRET environment variable
