# Server
server.port=8081

# Active profile (override: SPRING_PROFILES_ACTIVE=prod)
spring.profiles.active=dev

# PostgreSQL — override via env in production
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=grok_dev

# For data.sql to run
spring.sql.init.mode=always
spring.sql.init.separator=;

# Broker server timezone for naive TIMESTAMP columns
grok.market.broker-server-zone=UTC

# JWT — override via JWT_SECRET in production
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-jwt-must-be-at-least-32-chars-long-here-for-demo}
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# CORS — origin patterns (supports LAN IP e.g. http://103.118.183.185:4200)
grok.cors.allowed-origin-patterns=http://localhost:4200,http://127.0.0.1:4200,http://*:4200

# Order RSI SSE poll interval (ms) — how often backend checks Postgres for new snapshot
grok.order-rsi.stream-poll-ms=250
