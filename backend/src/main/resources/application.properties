# Server
server.port=8081

# PostgreSQL Database - grok_dev schema
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect  # removed - dialect is auto-detected
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use specific schema
spring.jpa.properties.hibernate.default_schema=grok_dev

# For data.sql to run
spring.sql.init.mode=always
spring.sql.init.separator=;

# Broker / MT5 server timezone for the stored 'time' column (wall time in broker server clock).
# Used to correctly convert to nyTime / istTime and for NY session filtering/aggregation.
# Examples: UTC, GMT+2, GMT+3, UTC+2, Etc/GMT+2
# Set to match what your MT5 terminal shows as server time (View > Market Watch or platform time).
# Default UTC works if your data timestamps align with real UTC (as in many samples).
grok.market.broker-server-zone=UTC

# No default user - admin is seeded via DataSeeder.java on startup
# Credentials: admin / admin123 (BCrypt encoded at runtime)

# JWT Configuration
jwt.secret=your-256-bit-secret-key-for-jwt-must-be-at-least-32-chars-long-here-for-demo
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# Logging - verbose for auth troubleshooting
logging.level.org.springframework.security=DEBUG
logging.level.com.grokdev=DEBUG
logging.level.org.springframework.web=DEBUG
# Uncomment below temporarily if you want to see even more SQL parameter binding
# logging.level.org.hibernate.orm.jdbc.bind=TRACE
# logging.level.org.hibernate.type.descriptor.sql=TRACE
